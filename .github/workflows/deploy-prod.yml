name: Deploy to Prod Environment

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build_and_deploy_prod:
    runs-on: ubuntu-latest
    environment: prod # This will enforce manual approval if configured
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # Or your specific pnpm version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your project's Node.js version
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra...

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActionsProdDeploy

      - name: CDK Deploy to Prod
        run: |
          STACK_SUFFIX="-prod"
          pnpm --filter infra cdk deploy "*${STACK_SUFFIX}" \
            -c environment=prod \
            --require-approval never \
            --outputs-file cdk-outputs-prod.json
        env:
          # Pass any other necessary environment variables for CDK
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }} # Example, if needed by your CDK
